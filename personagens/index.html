<!DOCTYPE html>

<head>

  <title>Wiki | Fragmentos da Eternidade</title>

  <link rel="stylesheet" href="../assets/css/style.css">

  <style>
    .wiki-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 30px;
    }

    .wiki-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(0,170,255,0.2);
      padding: 20px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
    }

    .wiki-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 0 20px rgba(0,170,255,0.2);
    }

    .wiki-card h3 {
      color: #00aaff;
      margin: 0 0 10px;
    }

    .locked {
      opacity: 0.4;
    }
  </style>
</head>

<body>

<header class="wiki-header">

  <div class="wiki-title">

    <!-- KYLO EXEMPLO FUTURO -->

    <!-- ORION -->

</html>
