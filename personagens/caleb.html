<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
      <title>Caleb | Fragmentos da Eternidade</title>
        <link rel="stylesheet" href="caleb.css">
        </head>

        <body>

          <div class="container">

              <!-- LADO ESQUERDO - VISUAL -->
                  <div class="left">

                        <div class="aura"></div>

                              <div class="model-box">
                                      <!-- Placeholder do 3D (depois entra Three.js aqui) -->
                                              <div class="model-placeholder">
                                                        <span>CALEB</span>
                                                                </div>
                                                                      </div>

                                                                            <p class="subtitle">Entidade desconhecida detectada</p>

                                                                                </div>

                                                                                    <!-- LADO DIREITO - INFORMAÇÕES -->
                                                                                        <div class="right">

                                                                                              <h1 class="name">CALEB</h1>

                                                                                                    <div class="info-box">
                                                                                                            <h3>IDENTIDADE</h3>

                                                                                                                    <p>Idade: <span id="idade">???</span></p>
                                                                                                                            <p>Origem: <span id="origem">???</span></p>
                                                                                                                                    <p>Status: <span id="status">???</span></p>

                                                                                                                                          </div>

                                                                                                                                                <div class="info-box">
                                                                                                                                                        <h3>REGISTROS</h3>

                                                                                                                                                                <p class="locked" id="log1">[ BLOQUEADO ] Fragmento 01</p>
                                                                                                                                                                        <p class="locked" id="log2">[ BLOQUEADO ] Fragmento 02</p>
                                                                                                                                                                              </div>

                                                                                                                                                                                    <button onclick="desbloquearOrigem()">Desbloquear fragmento</button>

                                                                                                                                                                                        </div>

                                                                                                                                                                                          </div>

                                                                                                                                                                                            <script src="caleb.js"></script>
                                                                                                                                                                                            </body>
                                                                                                                                                                                            </html>
